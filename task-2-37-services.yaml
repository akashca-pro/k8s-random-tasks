# Task 2.37 — Services for Task 2.36 Deployment (selector must match Pod labels)
# Replace namespace if yours differs from the Deployment manifest.
---
apiVersion: v1
kind: Service
metadata:
  name: task-2-37-clusterip
  namespace: akash-c-a
  labels:
    app: task-2-36-nginx
spec:
  type: ClusterIP
  selector:
    app: task-2-36-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: task-2-37-nodeport
  namespace: akash-c-a
  labels:
    app: task-2-36-nginx
spec:
  type: NodePort
  selector:
    app: task-2-36-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30090
      protocol: TCP