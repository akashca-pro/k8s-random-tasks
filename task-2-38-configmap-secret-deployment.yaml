# Task 2.38 — ConfigMap (env) + Secret (file mount)
# Namespace: align with your lab (same as other tasks).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: task-2-38-config
  namespace: akash-c-a
  labels:
    task: task-2-38
data:
  APP_ENV: "staging"
  API_URL: "https://api.example.internal/v1"
---
apiVersion: v1
kind: Secret
metadata:
  name: task-2-38-secret
  namespace: akash-c-a
  labels:
    task: task-2-38
type: Opaque
stringData:
  username: "app-reader"
  password: "change-me-in-real-clusters"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-2-38-deployment
  namespace: akash-c-a
  labels:
    app: task-2-38-app
    task: task-2-38
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-2-38-app
  template:
    metadata:
      labels:
        app: task-2-38-app
        task: task-2-38
    spec:
      containers:
        - name: nginx
          image: nginx:1.26
          ports:
            - containerPort: 80
          # ConfigMap → all keys as environment variables
          envFrom:
            - configMapRef:
                name: task-2-38-config
          # Secret → one file per key under this directory
          volumeMounts:
            - name: secret-files
              mountPath: /etc/task-2-38-secret
              readOnly: true
      volumes:
        - name: secret-files
          secret:
            secretName: task-2-38-secret
