apiVersion: v1
kind: ServiceAccount
metadata:
  name: akash-traefik
  namespace: akash-c-a
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: akash-traefik-controller
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: akash-traefik-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: akash-traefik-controller
subjects:
  - kind: ServiceAccount
    name: akash-traefik
    namespace: akash-c-a
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: akash-traefik
spec:
  controller: traefik.io/ingress-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: akash-traefik
  namespace: akash-c-a
  labels:
    app: akash-traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: akash-traefik
  template:
    metadata:
      labels:
        app: akash-traefik
    spec:
      serviceAccountName: akash-traefik
      containers:
        - name: traefik
          image: traefik:v2.11
          args:
            - --api.dashboard=true
            - --providers.kubernetesingress=true
            - --providers.kubernetesingress.ingressclass=akash-traefik
            - --providers.kubernetesingress.namespaces=akash-c-a
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
          ports:
            - name: web
              containerPort: 80
            - name: websecure
              containerPort: 443
---
apiVersion: v1
kind: Service
metadata:
  name: akash-traefik
  namespace: akash-c-a
spec:
  type: LoadBalancer
  selector:
    app: akash-traefik
  ports:
    - name: web
      port: 80
      targetPort: web
    - name: websecure
      port: 443
      targetPort: websecure
