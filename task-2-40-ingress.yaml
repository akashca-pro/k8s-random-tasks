apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-2-40-private-ingress
  namespace: akash-c-a

spec:
  ingressClassName: akash-traefik

  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: task-2-37-clusterip
                port:
                  number: 80